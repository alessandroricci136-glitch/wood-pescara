<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area Riservata — WOOD Pescara</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══ SCHERMATA LOGIN ═══ -->
<div class="admin-login" id="login-screen">
  <div class="admin-login__box">
    <div class="admin-login__logo">WOOD</div>
    <div class="admin-login__sub">Area Riservata</div>
    <div class="admin-field">
      <label for="login-user">Email</label>
      <input type="email" id="login-user" autocomplete="username" required />
    </div>
    <div class="admin-field">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" autocomplete="current-password" required />
    </div>
    <button class="btn btn--primary admin-login__btn" id="login-btn">Accedi</button>
    <p class="admin-login__error" id="login-error">Credenziali non corrette. Riprova.</p>
    <p style="margin-top:1.5rem;"><a href="index.html" style="font-size:0.78rem;color:var(--verde-foglia);">← Torna al sito</a></p>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard" style="display:none;">
  <div class="admin-bar">
    <div class="admin-bar__title">WOOD · Gestione Menu</div>
    <div class="admin-bar__actions">
      <span id="save-status" style="font-size:0.78rem;opacity:0.6;"></span>
      <button class="admin-btn admin-btn--danger" id="reset-btn">Ripristina default</button>
      <a href="menu.html" target="_blank" class="admin-btn">Vedi menu pubblico</a>
      <button class="admin-btn admin-btn--primary" id="save-btn">Salva modifiche</button>
      <button class="admin-btn" id="logout-btn">Esci</button>
    </div>
  </div>

  <div class="admin-wrap">
    <p style="color:var(--grigio);font-size:0.9rem;margin-bottom:2rem;max-width:640px;">
      Modifica piatti, prezzi e categorie. Le modifiche vengono salvate su Firebase
      e si riflettono immediatamente sulla pagina Menu del sito.
    </p>

    <div class="admin-add-cat">
      <div class="admin-field">
        <label for="new-cat-name">Nuova categoria</label>
        <input type="text" id="new-cat-name" placeholder="Es. Pizze Speciali" />
      </div>
      <button class="btn btn--primary" id="add-cat-btn">+ Aggiungi categoria</button>
    </div>

    <div id="categories-container"></div>
  </div>
</div>

<div class="admin-toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ3QZK2uOLOAtgTDwybUrQV3Z_EDd2IYM",
  authDomain: "wood-pescara.firebaseapp.com",
  projectId: "wood-pescara",
  storageBucket: "wood-pescara.firebasestorage.app",
  messagingSenderId: "776695686883",
  appId: "1:776695686883:web:f1f920b5b5d8736fb007d6"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ─── UI refs ───
const loginScreen = document.getElementById('login-screen');
const dashboard   = document.getElementById('dashboard');
const loginError  = document.getElementById('login-error');
const toast       = document.getElementById('toast');
const saveStatus  = document.getElementById('save-status');
const container   = document.getElementById('categories-container');

let menuData = [];

// ─── Auth state ───
onAuthStateChanged(auth, async user => {
  if (user) {
    loginScreen.style.display = 'none';
    dashboard.style.display   = 'block';
    await loadMenu();
  } else {
    loginScreen.style.display = 'flex';
    dashboard.style.display   = 'none';
  }
});

// ─── Login ───
document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-user').value.trim();
  const pass  = document.getElementById('login-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    loginError.classList.remove('show');
  } catch {
    loginError.classList.add('show');
  }
});

// ─── Logout ───
document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

// ─── Carica menu da Firestore ───
async function loadMenu() {
  try {
    const snap = await getDoc(doc(db, 'config', 'menu_order'));
    if (!snap.exists()) {
      await setupInitialMenu();
      return;
    }
    const order = snap.data().order || [];
    menuData = [];
    for (const catId of order) {
      const catSnap = await getDoc(doc(db, 'menu', catId));
      if (catSnap.exists()) menuData.push({ id: catId, ...catSnap.data() });
    }
    renderCategories();
    markSaved();
  } catch(e) {
    showToast('Errore caricamento: ' + e.message);
  }
}

// ─── Menu default ───
const DEFAULT_MENU = [
  { id:"antipasti", title:"Antipasti & Fritti", items:[
    {name:"Tagliere WOOD",price:"22 €",desc:"Mortadella, crudo di Parma, lonza, bresaola, ventricina, salame, pecorino, bocconcino di provola affumicata. Per due persone.",tag:"Da condividere"},
    {name:"Lollipop di Pollo",price:"9 €",desc:"Alette di pollo croccanti, salsa a scelta.",tag:""},
    {name:"Crocchette di Patata Viola",price:"7 €",desc:"Cuore filante, panatura croccante.",tag:"Vegetariano"},
    {name:"Sfere Philadelphia e Mortadella",price:"10 €",desc:"In croccante di cornflakes, su besciamella di pistacchio e germogli.",tag:""},
    {name:"Anelli di Cipolla",price:"6 €",desc:"Pastella croccante, fritti al momento.",tag:"Vegano"},
    {name:"Bruschette Miste",price:"8 €",desc:"Pomodorino fresco, basilico, olio EVO su pane casereccio.",tag:""}
  ]},
  { id:"pizze-classiche", title:"Pizze Classiche", items:[
    {name:"Marinara",price:"6 €",desc:"Pomodoro, aglio, origano, olio EVO.",tag:"Vegano"},
    {name:"Margherita",price:"7 €",desc:"Pomodoro, mozzarella fior di latte, basilico fresco.",tag:"Vegetariano"},
    {name:"Margherita di Bufala",price:"10 €",desc:"Pomodoro, mozzarella di bufala DOP, basilico, olio EVO a crudo.",tag:"Consigliata"},
    {name:"Ventricina",price:"11 €",desc:"Pomodoro, mozzarella fior di latte, ventricina abruzzese, olio EVO.",tag:""},
    {name:"Diavola",price:"10 €",desc:"Pomodoro, mozzarella, salame piccante.",tag:""},
    {name:"Capricciosa",price:"11 €",desc:"Pomodoro, mozzarella, prosciutto cotto, funghi, carciofi, olive.",tag:""}
  ]},
  { id:"pizze-gourmet", title:"Pizze Gourmet WOOD", items:[
    {name:"Tartufo e Porcini",price:"16 €",desc:"Base crema di tartufo, provola affumicata, funghi porcini, champignon, pioppini, olio EVO e burratina di tartufo al centro.",tag:"Signature"},
    {name:"Bufala e Ventricina Piccante",price:"14 €",desc:"Mozzarella di bufala DOP, pomodoro, ventricina, jalapenos ripieni di formaggio e cipolla caramellata.",tag:"Piccante"},
    {name:"Zucca e Salsiccia",price:"14 €",desc:"Crema di zucca, mozzarella di bufala DOP, salsiccia di fegato, cicorietta selvatica, peperone dolce di Altino, scaglie di grana e olio EVO.",tag:"Stagionale"},
    {name:"Tartufo, Speck e Noci",price:"15 €",desc:"Base crema di tartufo, provola affumicata, funghi porcini, salsiccia, olio EVO. In uscita speck, ricotta e noci.",tag:""},
    {name:"Pulled Pork",price:"14 €",desc:"Mozzarella fior di latte, patate, pulled pork affumicato, salsa barbecue.",tag:""},
    {name:"Pistacchio e Ricotta",price:"14 €",desc:"Crema di pistacchio, ricotta, mortadella, granella di pistacchio.",tag:"Signature"},
    {name:"Pizza Fritta WOOD",price:"13 €",desc:"Impasto fritto a regola d'arte, ricotta, provola, guanciale croccante, pepe.",tag:""}
  ]},
  { id:"arrosticini", title:"Arrosticini & Griglia", items:[
    {name:"Arrosticini fatti a mano (10 pz)",price:"12 €",desc:"Carne di pecora tagliata e infilzata a mano, brace viva. La specialita della casa.",tag:"Consigliati"},
    {name:"Arrosticini a macchina (10 pz)",price:"9 €",desc:"Lavorazione classica, sapore deciso.",tag:""},
    {name:"Tagliata di Manzo",price:"18 €",desc:"Rucola, scaglie di grana, riduzione di aceto balsamico.",tag:""},
    {name:"Salsicce alla Brace",price:"9 €",desc:"Salsiccia di suino, cottura lenta su brace di legna.",tag:""},
    {name:"Hamburger WOOD",price:"13 €",desc:"200g di manzo, cheddar, bacon croccante, salsa della casa, patatine.",tag:""}
  ]},
  { id:"dolci", title:"Dolci", items:[
    {name:"Tiramisu al Pistacchio",price:"7 €",desc:"Crema al mascarpone, crumble al pistacchio. Il piu richiesto.",tag:"Consigliato"},
    {name:"Cheesecake della Casa",price:"7 €",desc:"Base biscotto, frutti di bosco freschi.",tag:""},
    {name:"Pizza Fritta Dolce",price:"8 €",desc:"Nutella, granella di nocciola, zucchero a velo.",tag:""}
  ]},
  { id:"bevande", title:"Bevande", items:[
    {name:"Birra alla Spina",price:"5-7 €",desc:"Selezione artigianale, piccola / media / grande.",tag:""},
    {name:"Vino della Casa",price:"5 / 18 €",desc:"Calice o bottiglia, selezione abruzzese.",tag:""},
    {name:"Cocktail Margarita",price:"8 €",desc:"Tequila, triple sec, lime fresco.",tag:""},
    {name:"Acqua / Soft Drink",price:"3 €",desc:"Naturale o frizzante, bibite in lattina.",tag:""}
  ]}
];

async function setupInitialMenu() {
  menuData = JSON.parse(JSON.stringify(DEFAULT_MENU));
  await saveToFirestore();
  renderCategories();
  showToast('Menu iniziale caricato su Firebase.');
}

// ─── Salva su Firestore ───
async function saveToFirestore() {
  const batch = writeBatch(db);
  for (const cat of menuData) {
    batch.set(doc(db, 'menu', cat.id), { title: cat.title, items: cat.items });
  }
  batch.set(doc(db, 'config', 'menu_order'), { order: menuData.map(c => c.id) });
  await batch.commit();
}

document.getElementById('save-btn').addEventListener('click', async () => {
  try {
    await saveToFirestore();
    markSaved();
    showToast('Menu salvato su Firebase. Visibile subito sul sito.');
  } catch(e) {
    showToast('Errore salvataggio: ' + e.message);
  }
});

document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('Ripristinare il menu ai valori di default?')) return;
  await setupInitialMenu();
  showToast('Menu ripristinato.');
});

// ─── Aggiungi categoria ───
document.getElementById('add-cat-btn').addEventListener('click', () => {
  const input = document.getElementById('new-cat-name');
  const name  = input.value.trim();
  if (!name) return;
  const id = name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || ('cat-' + Date.now());
  menuData.push({ id, title: name, items: [] });
  input.value = '';
  markUnsaved();
  renderCategories();
});

// ─── Render ───
function renderCategories() {
  container.innerHTML = '';
  menuData.forEach((cat, ci) => {
    const catEl = document.createElement('div');
    catEl.className = 'admin-category';

    const head = document.createElement('div');
    head.className = 'admin-category__head';
    head.innerHTML = `
      <div class="admin-cat-reorder">
        <button class="admin-reorder-btn" data-action="up" data-cat="${ci}" ${ci===0?'disabled':''}>▲</button>
        <button class="admin-reorder-btn" data-action="down" data-cat="${ci}" ${ci===menuData.length-1?'disabled':''}>▼</button>
      </div>
      <input type="text" value="${esc(cat.title)}" data-cat="${ci}" class="cat-title-input" />
      <button class="admin-cat-remove" data-cat="${ci}">Elimina</button>`;
    catEl.appendChild(head);

    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'admin-items';
    cat.items.forEach((item, ii) => itemsWrap.appendChild(buildRow(ci, ii, item, cat.items.length)));

    const addBtn = document.createElement('button');
    addBtn.className = 'admin-add-item-btn';
    addBtn.textContent = '+ Aggiungi piatto';
    addBtn.addEventListener('click', () => {
      menuData[ci].items.push({name:'',price:'',desc:'',tag:''});
      markUnsaved(); renderCategories();
    });
    itemsWrap.appendChild(addBtn);
    catEl.appendChild(itemsWrap);
    container.appendChild(catEl);
  });

  container.querySelectorAll('.cat-title-input').forEach(inp => {
    inp.addEventListener('input', e => { menuData[e.target.dataset.cat].title = e.target.value; markUnsaved(); });
  });
  container.querySelectorAll('.admin-cat-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      if (!confirm('Eliminare questa categoria?')) return;
      menuData.splice(e.target.dataset.cat, 1); markUnsaved(); renderCategories();
    });
  });
  container.querySelectorAll('.admin-reorder-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.currentTarget.dataset.cat);
      const dir = e.currentTarget.dataset.action;
      const to  = dir==='up' ? idx-1 : idx+1;
      if (to<0||to>=menuData.length) return;
      [menuData[idx],menuData[to]]=[menuData[to],menuData[idx]];
      markUnsaved(); renderCategories();
    });
  });
}

function buildRow(ci, ii, item, total) {
  const row = document.createElement('div');
  row.className = 'admin-item';
  row.innerHTML = `
    <div class="admin-item-reorder">
      <button class="admin-reorder-btn admin-reorder-btn--xs" data-action="up" ${ii===0?'disabled':''}>▲</button>
      <button class="admin-reorder-btn admin-reorder-btn--xs" data-action="down" ${ii===total-1?'disabled':''}>▼</button>
    </div>
    <input type="text" placeholder="Nome piatto" value="${esc(item.name)}" data-field="name" />
    <input type="text" placeholder="Prezzo" value="${esc(item.price)}" data-field="price" />
    <select data-field="tag">
      ${['','Consigliata','Consigliato','Consigliati','Signature','Stagionale','Piccante','Vegano','Vegetariano','Da condividere']
        .map(t=>`<option value="${t}" ${item.tag===t?'selected':''}>${t||'Nessun tag'}</option>`).join('')}
    </select>
    <input type="text" placeholder="Descrizione" value="${esc(item.desc)}" data-field="desc" />
    <button class="admin-item-remove" title="Elimina">✕</button>`;

  row.querySelectorAll('input,select').forEach(f => {
    f.addEventListener('input', e => { menuData[ci].items[ii][e.target.dataset.field]=e.target.value; markUnsaved(); });
  });
  row.querySelector('.admin-item-remove').addEventListener('click', () => {
    menuData[ci].items.splice(ii,1); markUnsaved(); renderCategories();
  });
  row.querySelectorAll('.admin-item-reorder .admin-reorder-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const dir = e.currentTarget.dataset.action;
      const to  = dir==='up' ? ii-1 : ii+1;
      const items = menuData[ci].items;
      if (to<0||to>=items.length) return;
      [items[ii],items[to]]=[items[to],items[ii]];
      markUnsaved(); renderCategories();
    });
  });
  return row;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2400); }
function markUnsaved(){ saveStatus.textContent='Modifiche non salvate'; saveStatus.style.color='#E0A85A'; }
function markSaved(){ saveStatus.textContent='Tutto salvato'; saveStatus.style.color='rgba(245,240,232,0.6)'; }
</script>
</body>
</html>
